# Cargo 配置文件

# 全局构建配置 - 提高编译速度
[build]
# 使用所有 CPU 核心并行编译
jobs = 8
# 增量编译（开发时加速）
incremental = true

# 编译器优化配置
[profile.dev]
# 开发模式：快速编译，较少优化
opt-level = 0
debug = true
incremental = true

[profile.release]
# 发布模式：完全优化
opt-level = 3
lto = "thin"  # 使用 thin LTO 而不是 fat LTO，编译更快
codegen-units = 16  # 增加代码生成单元，加快编译
strip = true  # 移除调试符号，减小体积

# HarmonyOS 目标配置 - 使用短路径避免空格问题
[target.aarch64-unknown-linux-ohos]
linker = "C:\\PROGRA~1\\Huawei\\DEVECO~1\\sdk\\default\\OPENHA~1\\native\\llvm\\bin\\clang.exe"
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=--target=aarch64-linux-ohos",
    "-C", "link-arg=--sysroot=C:\\PROGRA~1\\Huawei\\DEVECO~1\\sdk\\default\\OPENHA~1\\native\\sysroot",
    "-C", "link-arg=-D__MUSL__",
    # 添加更安全的编译选项以避免 SIGSEGV
    "-C", "overflow-checks=on",
    "-C", "panic=abort",
    # 禁用可能导致问题的优化
    "-C", "opt-level=2",
    # 确保正确的内存对齐
    "-C", "target-feature=+strict-align",
]

[target.armv7-unknown-linux-ohos]
linker = "clang"
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=--target=armv7-linux-ohos",
    "-C", "link-arg=--sysroot=C:\\Program Files\\Huawei\\DevEco Studio\\sdk\\default\\openharmony\\native\\sysroot",
    "-C", "link-arg=-D__MUSL__"
]

[target.x86_64-unknown-linux-ohos]
linker = "clang"
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=--target=x86_64-linux-ohos",
    "-C", "link-arg=--sysroot=C:\\Program Files\\Huawei\\DevEco Studio\\sdk\\default\\openharmony\\native\\sysroot",
    "-C", "link-arg=-D__MUSL__"
]