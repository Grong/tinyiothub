[plugin]
name = "mqtt_sub_example"
version = "1.0.0"
type = "protocol"
description = "MQTT 订阅示例"

[protocol]
type = "mqtt_subscribe"
broker_url = "mqtt://localhost:1883"
client_id = "tinyiothub_client_001"
topic = "sensors/+/data"
qos = 1

[protocol.username]
username = "user"
password = "pass"

[mapping]
temperature = "$.temperature"
humidity = "$.humidity"
