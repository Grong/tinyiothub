# Mosquitto 配置文件

# 监听设置
listener 1883
protocol mqtt

listener 9001
protocol websockets
socket_domain ipv4

# 身份验证配置（允许匿名但受 ACL 限制）
allow_anonymous true
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# 持久化
persistence true
persistence_location /mosquitto/data/

# 日志
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# 日志文件权限（保护敏感日志）
log_retain true
log_format json

# 连接设置
max_connections -1
max_keepalive 65535

# 安全设置
tls_version tlsv1.2
