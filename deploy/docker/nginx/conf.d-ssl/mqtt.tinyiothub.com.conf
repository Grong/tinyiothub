# mqtt.tinyiothub.com - MQTT over WebSocket (HTTPS)

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name mqtt.tinyiothub.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://mqtt.tinyiothub.com$request_uri;
    }
}

# HTTPS MQTT WebSocket
server {
    listen 443 ssl http2;
    server_name mqtt.tinyiothub.com;

    ssl_certificate /etc/nginx/ssl/live/mqtt.tinyiothub.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/mqtt.tinyiothub.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://tinyiothub-mqtt:9001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
