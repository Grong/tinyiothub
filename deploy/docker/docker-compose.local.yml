# ============================================
# 本地测试用 docker-compose
# 使用方式: docker compose -f docker-compose.local.yml up --build
# ============================================

services:
  # ============================================
  # TinyIoTHub API 后端服务（本地构建）
  # ============================================
  tinyiothub-api:
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: tinyiothub-api
    restart: unless-stopped

    ports:
      - "3002:3002"

    environment:
      - RUST_LOG=info
      - TZ=Asia/Shanghai
      - TINYIOTHUB__PROJECT_ROOT=/app
      - TINYIOTHUB__DATABASE__URL=/app/data/tinyiothub.db
      - TINYIOTHUB__SECURITY__JWT__SECRET=tinyiothub-default-jwt-secret-change-in-production-32chars
      - TINYIOTHUB__OPENCLAW__URL=http://zeroclaw:42617
      - TINYIOTHUB__OPENCLAW__WS_URL=ws://zeroclaw:42617

    volumes:
      - ./data/api:/app/data
      - ./logs:/app/logs
      - ./templates:/app/templates

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Marketplace 市场服务（本地构建）
  # ============================================
  tinyiothub-marketplace:
    build:
      context: ../../
      dockerfile: marketplace/Dockerfile
    container_name: tinyiothub-marketplace
    restart: unless-stopped

    ports:
      - "3003:3003"

    environment:
      - RUST_LOG=info
      - TZ=Asia/Shanghai
      - TINYIOTHUB__PROJECT_ROOT=/app
      - TINYIOTHUB__DATABASE__URL=/app/data/tinyiothub.db
      - TINYIOTHUB__SECURITY__JWT__SECRET=tinyiothub-default-jwt-secret-change-in-production-32chars

    volumes:
      - ./data/marketplace:/app/data
      - ./logs:/app/logs
      - ./templates:/app/templates

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # MQTT Broker (Eclipse Mosquitto)
  # ============================================
  tinyiothub-mqtt:
    image: eclipse-mosquitto:2.0.15
    container_name: tinyiothub-mqtt
    restart: unless-stopped

    ports:
      - "1883:1883"
      - "9001:9001"

    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./data/mosquitto:/mosquitto/data
      - ./data/mosquitto:/mosquitto/log

    ulimits:
      memlock: -1

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: tinyiothub-network-local
