name: Feature Request
description: 提议新功能或改进
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        感谢你分享想法。请聚焦用户价值、约束条件和上线安全性。
        请勿包含个人/敏感数据。

  - type: input
    id: summary
    attributes:
      label: 一句话描述
      description: 用一句话描述你希望实现的能力。
      placeholder: 支持设备数据导出为 CSV 格式。
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 问题陈述
      description: 这个功能解决什么用户痛点？当前行为为什么不满足需求？
      placeholder: 运维人员需要定期导出设备数据进行离线分析，目前只能逐条查看 ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述期望的行为和接口。
      placeholder: 在设备详情页添加「导出 CSV」按钮，支持选择时间范围和字段。
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: 不在范围内
      description: 明确第一版不包含的内容（帮助缩小讨论范围）。
      placeholder: 不包含 PDF 导出，不包含定时自动导出。
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 你评估过哪些替代方案？
      placeholder: 使用 API 自行导出、使用数据库直连等。
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 什么样的结果才算完成？（可在评审阶段细化）
      placeholder: |
        - 设备详情页展示「导出 CSV」按钮
        - 支持选择时间范围（最近 7 天/30 天/自定义）
        - 导出文件包含设备 ID、时间戳、数值字段
    validations:
      required: false

  - type: textarea
    id: architecture
    attributes:
      label: 架构影响
      description: 涉及哪些子系统？（可选，维护者会在评审中评估）
      placeholder: cloud/src/modules/device/、web/src/ui/views/device-detail.ts
    validations:
      required: false

  - type: textarea
    id: risk
    attributes:
      label: 风险与回滚
      description: 主要风险及快速回滚方式（可选，可在规划阶段定义）。
      placeholder: 风险是大数据量导出可能超时；回滚方式是移除按钮即可。
    validations:
      required: false

  - type: dropdown
    id: breaking
    attributes:
      label: 是否 Breaking Change？
      options:
        - "否"
        - "是"
    validations:
      required: true

  - type: checkboxes
    id: hygiene
    attributes:
      label: 数据卫生检查
      options:
        - label: 我已移除示例、载荷和日志中的个人/敏感数据。
          required: true
        - label: 我使用了中性、聚焦项目的措辞和占位符。
          required: true
