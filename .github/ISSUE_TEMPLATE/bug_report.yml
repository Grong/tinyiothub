name: Bug Report
description: Report a reproducible defect in TinyIoTHub
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间报告 bug。请提供最小可复现案例，方便快速定位。
        请勿包含个人/敏感数据；日志和配置请脱敏处理。

  - type: dropdown
    id: component
    attributes:
      label: 受影响模块
      options:
        - 设备管理 (device)
        - AI Agent / 聊天
        - 告警 (alert)
        - 用户认证 (auth)
        - 前端 UI
        - 部署 / Docker
        - 文档
        - 未知
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: 严重程度
      options:
        - S0 — 数据丢失 / 安全风险
        - S1 — 核心流程阻塞
        - S2 — 功能降级
        - S3 — 轻微问题
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: 当前行为
      description: 现在发生了什么？
      placeholder: 设备列表页面加载失败，报错 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 应该发生什么？
      placeholder: 正常显示设备列表，包含所有已注册设备。
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 请提供精确的操作步骤、配置或截图。
      placeholder: |
        1. 登录系统
        2. 进入设备管理页面
        3. 点击「添加设备」
        4. 观察到错误提示
      render: bash
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 错误信息
      description: 粘贴相关日志（请脱敏处理）。
      render: text
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: TinyIoTHub 版本
      placeholder: v0.2.4 / commit SHA
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: Ubuntu 24.04 / macOS 15 / Windows 11
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: 浏览器（前端问题时填写）
      placeholder: Chrome 125 / Safari 18
    validations:
      required: false

  - type: dropdown
    id: regression
    attributes:
      label: 是否为回退问题？
      options:
        - 未知
        - 是，之前正常
        - 否，首次使用
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已在最新版本（main 分支或最新 release）上复现此问题。
          required: true
        - label: 我已移除所有提交内容中的密钥、令牌和个人数据。
          required: true
