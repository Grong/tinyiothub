name: CI

on:
  push:
    branches: [master, saas]
  pull_request:
    branches: [master, saas]

env:
  CARGO_TERM_COLOR: always

jobs:
  # -----------------------------------------------------------------------------
  # 后端检查
  # -----------------------------------------------------------------------------
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要历史来检测新文件

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            api/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('api/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check
        run: cargo check

      - name: Fmt
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings --allow dead_code --allow unused_imports --allow unused_variables --allow unused_mut --allow non_snake_case

      - name: Test
        run: cargo test --all

      - name: Detect new files
        id: new-files
        run: |
          # 获取相对于 origin/saas 的新增文件
          NEW_FILES=$(git diff --name-only origin/saas...HEAD --diff-filter=A | grep -E "\.(rs)$" || true)
          echo "new_files=$NEW_FILES" >> $GITHUB_OUTPUT
          echo "=== New Rust files in this PR ==="
          if [ -z "$NEW_FILES" ]; then
            echo "(none)"
          else
            echo "$NEW_FILES"
          fi

      - name: Architecture Check (New Files Only)
        if: steps.new-files.outputs.new_files != ''
        run: |
          echo "=== Checking ONLY new files for architecture violations ==="
          NEW_FILES="${{ steps.new-files.outputs.new_files }}"
          for file in $NEW_FILES; do
            echo "Checking: $file"
            
            # 1. 检查是否在 api/src/ 下创建了散弹式 utils/helpers
            if echo "$file" | grep -qE "^api/src/utils.*\.rs$|^api/src/helpers.*\.rs$|^api/src/common.*\.rs$"; then
              echo "❌ ARCHITECTURE VIOLATION: Cannot create scatter-shot utils/helpers: $file"
              echo "   ✅ Use shared/ or specific domain modules"
              exit 1
            fi
            
            # 2. 检查新文件是否在 domain/ 但没有 #[cfg(test)]
            if echo "$file" | grep -qE "^api/src/domain/.*\.rs$"; then
              if ! grep -qE "#\[cfg\(test\)\]|#\[test\]" "$file" 2>/dev/null; then
                echo "⚠️  WARNING: New domain file has no tests: $file"
                # 不强制失败，只警告
              fi
            fi
          done
          echo "✅ New file architecture check passed"

      - name: Grandfathered Check (All Files)
        run: |
          echo "=== Checking ALL modified files for critical violations ==="
          
          # 这些检查对所有文件生效（不论新旧）
          
          # 检查 1：禁止直接 panic/unwrap in handlers
          MODIFIED_HANDLERS=$(git diff --name-only origin/saas...HEAD | grep -E "^api/src/api/.*\.rs$" || true)
          if [ -n "$MODIFIED_HANDLERS" ]; then
            for file in $MODIFIED_HANDLERS; do
              if grep -qE "\.unwrap\(\)|\.expect\(\)" "$file" 2>/dev/null; then
                echo "❌ VIOLATION: unwrap/expect found in handler: $file"
                echo "   ✅ Use ? operator or map_err"
                # 降级为警告，因为历史代码可能有很多
                echo "⚠️  WARNING (grandfathered): unwrap in $file - should be fixed"
              fi
            done
          fi

  # -----------------------------------------------------------------------------
  # 前端检查
  # -----------------------------------------------------------------------------
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Test
        run: pnpm test --if-present

      - name: ESLint
        run: pnpm lint --if-present 2>&1 || echo "No lint script configured"

      - name: Build
        run: pnpm build

      - name: Detect new TypeScript files
        id: new-ts-files
        run: |
          NEW_FILES=$(git diff --name-only origin/saas...HEAD --diff-filter=A | grep -E "\.(ts|tsx)$" || true)
          echo "new_files=$NEW_FILES" >> $GITHUB_OUTPUT
          echo "=== New TypeScript files in this PR ==="
          if [ -z "$NEW_FILES" ]; then
            echo "(none)"
          else
            echo "$NEW_FILES"
          fi

      - name: Frontend Architecture Check (New Files Only)
        if: steps.new-ts-files.outputs.new_files != ''
        run: |
          echo "=== Checking ONLY new files for frontend architecture violations ==="
          NEW_FILES="${{ steps.new-ts-files.outputs.new_files }}"
          for file in $NEW_FILES; do
            echo "Checking: $file"
            
            # 禁止在 app/ 或 components/ 下直接 fetch
            case "$file" in
              web/app/*|web/components/*)
                if grep -qE "fetch\(|axios\.|useQuery\s*\(" "$file" 2>/dev/null; then
                  echo "❌ ARCHITECTURE VIOLATION: Direct API call in component: $file"
                  echo "   ✅ Must use service layer + hooks"
                  exit 1
                fi
                ;;
            esac
            
            # 新增的 service 文件必须有导出
            if echo "$file" | grep -qE "^web/service/.*\.ts$"; then
              if ! grep -qE "^export " "$file" 2>/dev/null; then
                echo "❌ VIOLATION: Service file has no exports: $file"
                exit 1
              fi
            fi
          done
          echo "✅ New file frontend architecture check passed"

  # -----------------------------------------------------------------------------
  # Commit Message 检查
  # -----------------------------------------------------------------------------
  commit-message-check:
    name: Commit Message Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check commit message
        run: |
          COMMITS=$(git log origin/saas..HEAD --oneline --format="%s")
          echo "=== Commit Messages ==="
          echo "$COMMITS"
          echo ""
          for msg in $COMMITS; do
            # 跳过 merge commits
            if echo "$msg" | grep -qE "^Merge"; then
              continue
            fi
            # 检查格式：<type>(<scope>): <desc>
            if ! echo "$msg" | grep -qE "^(feat|fix|test|chore|docs|refactor|style|perf|ci|build)\([a-z0-9_-]+\):"; then
              echo "❌ Invalid commit message format: $msg"
              echo "   ✅ Format: <type>(<scope>): <description>"
              echo "   ✅ Example: feat(device): add temperature monitoring"
              exit 1
            fi
          done
          echo "✅ All commit messages are valid"
