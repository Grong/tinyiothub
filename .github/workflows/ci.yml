name: CI

on:
  push:
    branches: [master, saas]
  pull_request:
    branches: [master, saas]

env:
  CARGO_TERM_COLOR: always

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            api/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('api/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check
        run: cargo check

      - name: Fmt
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings --allow dead_code --allow unused_imports --allow unused_variables --allow unused_mut --allow non_snake_case

      - name: Test
        run: cargo test --all

      - name: Architecture Check
        run: |
          echo "=== Checking for hardcoded API responses ==="
          ! grep -r "Json(serde_json::to_value" api/src/api/ || exit 1
          echo "=== Checking for direct SQL in handlers ==="
          ! grep -r "conn.query_row\|pool.query\|.execute(" api/src/api/ || exit 1
          echo "=== Checking for bypass of service layer (frontend) ==="
          ! grep -r "fetch\|axios\|useQuery" web/app/ web/components/ 2>/dev/null || echo "WARNING: Direct API calls or useQuery found in components"

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Test
        run: pnpm test --if-present

      - name: Build
        run: pnpm build
