name: CI

on:
  push:
    branches: [main, master, saas]
  pull_request:
    branches: [main, master, saas]

env:
  CARGO_TERM_COLOR: always

jobs:
  # -----------------------------------------------------------------------------
  # Rust Workspace Check
  # -----------------------------------------------------------------------------
  rust-check:
    name: Rust Workspace Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check workspace
        run: cargo check --workspace

      - name: Fmt
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace -- -W clippy::all
        continue-on-error: true

      - name: Test workspace
        run: cargo test --workspace --exclude zeroclaw --lib --bins --tests

      - name: Code coverage
        run: |
          cargo install cargo-tarpaulin --locked
          cargo tarpaulin --workspace --exclude zeroclaw --skip-clean --out xml --output-dir coverage
        continue-on-error: true

      - name: Security audit
        run: |
          cargo install cargo-audit --locked
          cargo audit
        continue-on-error: true

      - name: Dependency check (cargo-deny)
        run: |
          cargo install cargo-deny --locked
          cargo deny check
        continue-on-error: true

      - name: Detect new files
        id: new-files
        run: |
          NEW_FILES=$(git diff --name-only origin/${{ github.base_ref || 'main' }}...HEAD --diff-filter=A | grep -E "\.(rs)$" || true)
          {
            echo "new_files<<EOF"
            echo "$NEW_FILES"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "=== New Rust files in this PR ==="
          if [ -z "$NEW_FILES" ]; then
            echo "(none)"
          else
            echo "$NEW_FILES"
          fi

      - name: Architecture Check (New Files Only)
        if: steps.new-files.outputs.new_files != ''
        run: |
          echo "=== Checking ONLY new files for architecture violations ==="
          NEW_FILES="${{ steps.new-files.outputs.new_files }}"
          for file in $NEW_FILES; do
            echo "Checking: $file"

            # 1. 检查是否在 cloud/src/ 下创建了散弹式 utils/helpers
            if echo "$file" | grep -qE "^cloud/src/utils.*\.rs$|^cloud/src/helpers.*\.rs$|^cloud/src/common.*\.rs$"; then
              echo "❌ ARCHITECTURE VIOLATION: Cannot create scatter-shot utils/helpers: $file"
              echo "   ✅ Use shared/ or specific domain modules"
              exit 1
            fi

            # 2. 检查新 domain 文件是否有测试
            if echo "$file" | grep -qE "^cloud/src/modules/.*\.rs$"; then
              if ! grep -qE "#\[cfg\(test\)\]|#\[test\]" "$file" 2>/dev/null; then
                echo "⚠️  WARNING: New module file has no tests: $file"
              fi
            fi
          done
          echo "✅ New file architecture check passed"

      - name: Grandfathered Check (All Files)
        run: |
          echo "=== Checking ALL modified files for critical violations ==="

          MODIFIED_HANDLERS=$(git diff --name-only origin/${{ github.base_ref || 'main' }}...HEAD | grep -E "^cloud/src/modules/.*/handler.*\.rs$" || true)
          if [ -n "$MODIFIED_HANDLERS" ]; then
            for file in $MODIFIED_HANDLERS; do
              if grep -qE "\.unwrap\(\)|\.expect\(\)" "$file" 2>/dev/null; then
                echo "⚠️  WARNING (grandfathered): unwrap in $file - should be fixed"
              fi
            done
          fi

  # -----------------------------------------------------------------------------
  # 前端检查
  # -----------------------------------------------------------------------------
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Test
        run: pnpm --if-present test

      - name: Lint
        run: pnpm --if-present lint

      - name: Build
        run: pnpm build

      - name: Security audit
        run: pnpm audit --audit-level=high || echo "No vulnerabilities found or audit not configured"

      - name: Detect new TypeScript files
        id: new-ts-files
        run: |
          NEW_FILES=$(git diff --name-only origin/${{ github.base_ref || 'main' }}...HEAD --diff-filter=A | grep -E "\.(ts|tsx)$" || true)
          {
            echo "new_files<<EOF"
            echo "$NEW_FILES"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "=== New TypeScript files in this PR ==="
          if [ -z "$NEW_FILES" ]; then
            echo "(none)"
          else
            echo "$NEW_FILES"
          fi

      - name: Frontend Architecture Check (New Files Only)
        if: steps.new-ts-files.outputs.new_files != ''
        run: |
          echo "=== Checking ONLY new files for frontend architecture violations ==="
          NEW_FILES="${{ steps.new-ts-files.outputs.new_files }}"
          for file in $NEW_FILES; do
            echo "Checking: $file"
            # git diff returns paths relative to repo root (web/src/...),
            # but this step runs from web/ — strip the prefix.
            rel="${file#web/}"

            # 禁止在 ui/ 组件中直接 fetch
            case "$file" in
              web/src/ui/*)
                if grep -qE "fetch\(|axios\.|useQuery\s*\(" "$rel" 2>/dev/null; then
                  echo "❌ ARCHITECTURE VIOLATION: Direct API call in component: $file"
                  echo "   ✅ Must use web/src/api/ layer"
                  exit 1
                fi
                ;;
            esac

            # 新增的 API 文件必须有导出
            if echo "$file" | grep -qE "^web/src/api/.*\.ts$"; then
              if ! grep -qE "^export " "$rel" 2>/dev/null; then
                echo "❌ VIOLATION: API file has no exports: $file"
                exit 1
              fi
            fi
          done
          echo "✅ New file frontend architecture check passed"

  # -----------------------------------------------------------------------------
  # Commit Message 检查
  # -----------------------------------------------------------------------------
  commit-message-check:
    name: Commit Message Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check commit message
        run: |
          BASE_REF="${{ github.base_ref || 'main' }}"
          git fetch origin "$BASE_REF" --depth=1 2>/dev/null || true
          COMMITS=$(git log "origin/$BASE_REF..HEAD" --oneline --format="%s" 2>/dev/null || echo "")
          if [ -z "$COMMITS" ]; then
            echo "✅ No commits to check"
            exit 0
          fi
          echo "=== Commit Messages ==="
          echo "$COMMITS"
          echo ""
          echo "$COMMITS" | while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            # 跳过 merge commits
            if echo "$msg" | grep -qE "^Merge"; then
              continue
            fi
            # 检查格式：<type>(<scope>): <desc>
            if ! echo "$msg" | grep -qE "^(feat|fix|test|chore|docs|refactor|style|perf|ci|build)\([a-z0-9_-]+\):"; then
              echo "❌ Invalid commit message format: $msg"
              echo "   ✅ Format: <type>(<scope>): <description>"
              echo "   ✅ Example: feat(device): add temperature monitoring"
              exit 1
            fi
          done
          echo "✅ All commit messages are valid"
