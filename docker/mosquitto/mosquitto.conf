# Mosquitto 配置文件

# 监听设置
listener 1883
protocol mqtt

listener 9001
protocol websockets
socket_domain ipv4

# 允许匿名访问（生产环境建议关闭）
allow_anonymous false

# 密码文件
password_file /mosquitto/config/pwfile

# 持久化
persistence true
persistence_location /mosquitto/data/

# 日志
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# 连接设置
max_connections -1
max_keepalive 65535

# 安全设置
tls_version tlsv1.2
