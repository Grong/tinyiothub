version: '3.8'

services:
  # ============================================
  # Nginx 反向代理
  # ============================================
  tinyiothub-nginx:
    image: nginx:alpine
    container_name: tinyiothub-nginx
    restart: unless-stopped
    
    # 端口映射 - 统一入口
    ports:
      - "8080:80"
    
    # 配置文件挂载
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    
    # 依赖服务
    depends_on:
      - tinyiothub-api
      - tinyiothub-web
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # TinyIoTHub API 后端服务
  # ============================================
  tinyiothub-api:
    build:
      context: ../api
      dockerfile: Dockerfile
    image: tinyiothub-api:latest
    container_name: tinyiothub-api
    restart: unless-stopped
    
    # 停止配置
    stop_grace_period: 10s
    stop_signal: SIGTERM
    
    # 内部端口（不对外暴露）
    expose:
      - "3002"
    
    # 特权模式（串口设备访问）
    privileged: true
    
    # 设备映射（串口设备 - Linux 环境）
    # Windows 环境下串口访问需要特殊配置
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
    #   - /dev/ttyUSB1:/dev/ttyUSB1
    
    # 环境变量（使用双下划线表示嵌套）
    environment:
      - RUST_LOG=info
      - TZ=Asia/Shanghai
      - TINYIOTHUB__DATABASE__URL=/app/data/tinyiothub.db
      - TINYIOTHUB__SECURITY__JWT__SECRET=tinyiothub-default-jwt-secret-change-in-production-32chars
    
    # 数据卷挂载
    volumes:
      # 配置文件
      - ../api/app_settings.toml:/app/app_settings.toml:ro
      # 数据库目录（持久化）
      - ./data:/app/data
      # 日志目录
      - ./logs:/app/logs
      # 设备模板（如果需要自定义）
      - ../api/templates:/app/templates:ro
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # TinyIoTHub Web 前端服务
  # ============================================
  tinyiothub-web:
    build:
      context: ../web
      dockerfile: Dockerfile
    image: tinyiothub-web:latest
    container_name: tinyiothub-web
    restart: unless-stopped
    
    # 停止配置
    stop_grace_period: 10s
    stop_signal: SIGTERM
    
    # 内部端口（不对外暴露）
    expose:
      - "3000"
    
    # 环境变量
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      # API 地址（通过 Nginx 代理，使用相对路径）
      - NEXT_PUBLIC_API_PREFIX=/api/v1
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # 依赖后端服务
    depends_on:
      - tinyiothub-api
