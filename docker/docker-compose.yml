version: '3.8'

services:
  # ============================================
  # Nginx 反向代理
  # ============================================
  tinyiothub-nginx:
    image: nginx:alpine
    container_name: tinyiothub-nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
      - "8883:8883"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./data/certbot:/var/www/certbot

    depends_on:
      - tinyiothub-api
      - tinyiothub-mqtt

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # TinyIoTHub API 后端服务
  # ============================================
  tinyiothub-api:
    image: chenguorongz/tinyiothub:latest
    container_name: tinyiothub-api
    restart: unless-stopped

    expose:
      - "3002"

    privileged: true

    environment:
      - RUST_LOG=info
      - TZ=Asia/Shanghai
      - TINYIOTHUB__DATABASE__URL=/app/data/tinyiothub.db
      - TINYIOTHUB__SECURITY__JWT__SECRET=tinyiothub-default-jwt-secret-change-in-production-32chars
      - TINYIOTHUB__MQTT__PRIMARY__USERNAME=admin
      - TINYIOTHUB__MQTT__PRIMARY__PASSWORD=admin123
      - TINYIOTHUB__SERVER__CORS_ORIGINS=https://tinyiothub.com,https://www.tinyiothub.com,https://api.tinyiothub.com,https://docs.tinyiothub.com,https://mqtt.tinyiothub.com

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # MQTT Broker (Eclipse Mosquitto)
  # ============================================
  tinyiothub-mqtt:
    image: eclipse-mosquitto:2
    container_name: tinyiothub-mqtt
    restart: unless-stopped

    ports:
      - "1883:1883"     # MQTT 原始端口
      - "9001:9001"    # MQTT over WebSocket

    volumes:
      - ./data/mosquitto:/mosquitto/data
      - ./data/mosquitto:/mosquitto/log
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/pwfile:/mosquitto/config/pwfile:ro

    user: "${UID:-1000}:${GID:-1000}"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Certbot (用于 SSL 证书申请)
  # ============================================
  certbot:
    image: certbot/certbot
    container_name: tinyiothub-certbot
    volumes:
      - ./data/certbot:/var/www/certbot
      - ./nginx/ssl:/etc/nginx/ssl
    entrypoint: "/bin/sh -c 'mkdir -p /var/www/certbot/.well-known/acme-challenge; trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  default:
    name: tinyiothub-network
