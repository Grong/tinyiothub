# tinyiothub.com - 主站（前端 + API）

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name tinyiothub.com www.tinyiothub.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.tinyiothub.com$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl http2;
    server_name www.tinyiothub.com;

    ssl_certificate /etc/nginx/ssl/live/www.tinyiothub.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/www.tinyiothub.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/ {
        proxy_pass http://api:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v1/ {
        proxy_pass http://api:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式响应支持
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    location /health {
        proxy_pass http://api:3002/health;
        access_log off;
    }

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 裸域名重定向
server {
    listen 443 ssl http2;
    server_name tinyiothub.com;
    ssl_certificate /etc/nginx/ssl/live/www.tinyiothub.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/www.tinyiothub.com/privkey.pem;
    return 301 https://www.tinyiothub.com$request_uri;
}
