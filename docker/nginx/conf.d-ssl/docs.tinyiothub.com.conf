# docs.tinyiothub.com - 文档站点

server {
    listen 80;
    server_name docs.tinyiothub.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://docs.tinyiothub.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name docs.tinyiothub.com;

    ssl_certificate /etc/nginx/ssl/live/docs.tinyiothub.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/docs.tinyiothub.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://docs:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
