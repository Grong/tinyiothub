# api.tinyiothub.com - API 服务（HTTPS）

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name api.tinyiothub.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://api.tinyiothub.com$request_uri;
    }
}

# HTTPS API
server {
    listen 443 ssl http2;
    server_name api.tinyiothub.com;

    ssl_certificate /etc/nginx/ssl/live/api.tinyiothub.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/api.tinyiothub.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CORS - 允许前端跨域调用
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    location /health {
        proxy_pass http://api:3002/health;
        access_log off;
    }

    location / {
        proxy_pass http://api:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式响应支持
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }
}
