<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <mask id="lightningMask">
      <rect x="0" y="0" width="200" height="200" fill="white" />
      <!-- 缩小后的闪电，略微超出印章边界 -->
      <polygon points="100,5 60,105 88,105 72,195 132,85 105,85 120,5" fill="black" />
    </mask>
  </defs>
  <rect x="20" y="20" width="160" height="160" rx="6" fill="#0098FF" mask="url(#lightningMask)" />
</svg>