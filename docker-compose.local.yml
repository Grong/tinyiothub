services:
  tinyiothub:
    image: tinyiothub:latest
    container_name: tinyiothub
    restart: unless-stopped
    ports:
      - "3002:3002"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - RUST_LOG=info
      - TZ=Asia/Shanghai
      - TINYIOTHUB__DATABASE__URL=/app/data/tinyiothub.db
      - JWT_SECRET=tinyiothub-default-jwt-secret-change-in-production-32chars
      - MQTT_USERNAME=admin
      - MQTT_PASSWORD=admin123
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - tinyiothub-network

networks:
  tinyiothub-network:
    driver: bridge
