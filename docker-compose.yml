services:
  tinyiothub:
    image: chenguorongz/tinyiothub:latest
    container_name: tinyiothub
    restart: unless-stopped
    ports:
      - "3002:3002"
    volumes:
      # 持久化数据
      - ./data:/app/data
      # 持久化日志
      - ./logs:/app/logs
      # 自定义配置（可选，如果不挂载则使用镜像内的默认配置）
      # - ./app_settings.toml:/app/app_settings.toml:ro
    environment:
      - RUST_LOG=info
      - TZ=Asia/Shanghai
      - TINYIOTHUB__DATABASE__URL=/app/data/tinyiothub.db
      - JWT_SECRET=tinyiothub-default-jwt-secret-change-in-production-32chars
      - MQTT_USERNAME=admin
      - MQTT_PASSWORD=admin123
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - tinyiothub-network

networks:
  tinyiothub-network:
    driver: bridge
