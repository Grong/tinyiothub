[package]
name = "zeroclaw"
version = "0.6.9"
edition = "2024"
rust-version = "1.87"

[lib]
name = "zeroclaw"
path = "lib.rs"

[dependencies]
zeroclaw-macros = { path = "../zeroclaw-macros", version = "0.1.0" }
clap = { version = "4.5", features = ["derive"] }
clap_complete = "4.5"
tokio = { version = "1.50", default-features = false, features = ["rt-multi-thread", "macros", "time", "net", "io-util", "sync", "process", "io-std", "fs", "signal"] }
tokio-util = { version = "0.7", default-features = false }
tokio-stream = { version = "0.1.18", default-features = false, features = ["fs", "sync"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "blocking", "multipart", "stream", "socks"] }
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["std"] }
directories = "6.0"
toml = "1.0"
shellexpand = "3.1"
schemars = "1.2"
tracing = { version = "0.1", default-features = false }
tracing-subscriber = { version = "0.3", default-features = false, features = ["fmt", "ansi", "env-filter"] }
base64 = "0.22"
image = { version = "0.25", default-features = false, features = ["jpeg", "png"] }
urlencoding = "2.1"
nanohtml2text = "0.2"
anyhow = "1.0"
thiserror = "2.0"
uuid = { version = "1.22", default-features = false, features = ["v4", "std"] }
chacha20poly1305 = "0.10"
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
rand = "0.10"
portable-atomic = "1"
parking_lot = "0.12"
async-trait = "0.1"
ring = "0.17"
prost = { version = "0.14", default-features = false, features = ["derive"] }
lru = "0.16"
rusqlite = { version = "0.37", features = ["bundled"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "std", "serde"] }
chrono-tz = "0.10"
cron = "0.15"
dialoguer = { version = "0.12", features = ["fuzzy-select"] }
console = "0.16"
ratatui = { version = "0.30", default-features = true }
crossterm = { version = "0.29", features = ["event-stream"] }
glob = "0.3"
which = "8.0"
tokio-tungstenite = { version = "0.29", features = ["rustls-tls-webpki-roots"] }
tokio-socks = "0.5"
futures-util = { version = "0.3", default-features = false, features = ["sink", "std"] }
regex = "1.10"
hostname = "0.4.2"
rustls = "0.23"
rustls-pemfile = "2"
rustls-pki-types = "1.14.0"
tokio-rustls = "0.26.4"
webpki-roots = "1.0.6"
lettre = { version = "0.11.19", default-features = false, features = ["builder", "smtp-transport", "rustls-tls"] }
mail-parser = "0.11.2"
async-imap = { version = "0.11", features = ["runtime-tokio"], default-features = false }
axum = { version = "0.8", default-features = false, features = ["http1", "json", "tokio", "query", "ws", "macros"] }
hyper = { version = "1", features = ["http1", "server"] }
hyper-util = { version = "0.1", features = ["tokio", "server-auto", "server-graceful"] }
tower = { version = "0.5", default-features = false, features = ["util"] }
tower-http = { version = "0.6", default-features = false, features = ["limit", "timeout"] }
http-body-util = "0.1"
rust-embed = "8"
mime_guess = "2"
flate2 = "1"
tar = "0.4"
indicatif = "0.18"
tempfile = "3.26"
zip = { version = "8.1", default-features = false, features = ["deflate-flate2"] }
rumqttc = "0.24"

[target.'cfg(unix)'.dependencies]
libc = "0.2"
