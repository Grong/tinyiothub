# cargo-deny configuration for TinyIoTHub workspace
# https://embarkstudios.github.io/cargo-deny/

# Targets are now under [graph]
[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]

# -----------------------------------------------------------------------------
# Licensing
# -----------------------------------------------------------------------------
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "Unlicense",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "0BSD",
    "CDLA-Permissive-2.0",
]

# -----------------------------------------------------------------------------
# Bans (duplicate crates, yanked crates, etc.)
# -----------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

# Allow specific duplicates that are hard to avoid
skip = [
    # syn 1.x vs 2.x — proc-macro ecosystem transition
    { name = "syn", version = "1.0" },
]

# -----------------------------------------------------------------------------
# Advisories (security vulnerabilities)
# -----------------------------------------------------------------------------
[advisories]
version = 2
yanked = "warn"
ignore = [
    # RUSTSEC-2023-0071: rsa crate Marvin Attack (timing side-channel)
    # Affects: jwt-simple -> superboring -> rsa 0.9.10
    # Status: NO FIXED VERSION AVAILABLE. jwt-simple has no alternative
    # that avoids rsa entirely while keeping pure-Rust Ed25519 support.
    "RUSTSEC-2023-0071",

    # RUSTSEC-2025-0134: rustls-pemfile is unmaintained
    # Affects: reqwest 0.11 (via influxdb2), rumqttc 0.24, zeroclaw
    # Status: Upstream crates (influxdb2, rumqttc) have not migrated.
    # This is a maintenance warning, not an active vulnerability.
    "RUSTSEC-2025-0134",

    # RUSTSEC-2026-0104: Reachable panic in certificate revocation list parsing
    # Affects: rustls-webpki 0.102.8 (via rumqttc 0.24 -> rustls 0.22)
    # Status: rumqttc 0.24 pins rustls 0.22 which pins webpki 0.102.
    # rumqttc 0.25 still uses webpki 0.102. No upgrade path available.
    # Impact: TinyIoTHub does not use CRL parsing in rustls.
    "RUSTSEC-2026-0104",

    # RUSTSEC-2026-0098: Name constraints for URI names were incorrectly accepted
    # Affects: rustls-webpki 0.102.8 (via rumqttc 0.24)
    # Same root cause as RUSTSEC-2026-0104 — pinned by rumqttc 0.24.
    "RUSTSEC-2026-0098",

    # RUSTSEC-2026-0099: Name constraints accepted for wildcard certificates
    # Affects: rustls-webpki 0.102.8 (via rumqttc 0.24)
    # Same root cause as above.
    "RUSTSEC-2026-0099",

    # RUSTSEC-2026-0049: CRLs not considered authoritative by Distribution Point
    # Affects: rustls-webpki 0.102.8 (via rumqttc 0.24)
    # Same root cause as above.
    "RUSTSEC-2026-0049",

    # RUSTSEC-2025-0012: backoff is unmaintained
    # Affects: backoff 0.4.0 (transitive dependency)
    # Status: No direct use in TinyIoTHub code. Replaced by backon in
    # newer ecosystem but our transitive deps still pull it in.
    "RUSTSEC-2025-0012",

    # RUSTSEC-2025-0057: fxhash is no longer maintained
    # Affects: fxhash 0.2.1 (transitive dependency)
    # Status: Unmaintained only. Functional hash implementation.
    "RUSTSEC-2025-0057",

    # RUSTSEC-2024-0384: instant is unmaintained
    # Affects: instant 0.1.13 (transitive dependency)
    # Status: Unmaintained only. Used for wasm time emulation.
    "RUSTSEC-2024-0384",
]

# -----------------------------------------------------------------------------
# Sources (crates.io only, no git deps without approval)
# -----------------------------------------------------------------------------
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
